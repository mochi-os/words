notifications.title.message = ຂໍ້ຄວາມຄຳ
notifications.title.words = ຄຳ
notifications.body.started_game = {name} ໄດ້ເລີ່ມເກມ
notifications.body.played_move = {name} ຫຼິ້ນ {move}
notifications.body.passed = {name} ຂ້າມ
notifications.body.exchanged_tiles = {name} ໄດ້ແລກປ່ຽນກະເບື້ອງ
